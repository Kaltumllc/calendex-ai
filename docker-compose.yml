version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: calendex_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: calendex
      POSTGRES_PASSWORD: calendex_dev
      POSTGRES_DB: calendex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendex"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: calendex_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://calendex:calendex_dev@postgres:5432/calendex
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: calendex_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
