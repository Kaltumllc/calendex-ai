# railway.toml — API service
[build]
builder = "nixpacks"
buildCommand = "npm install"

[deploy]
startCommand = "node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "calendex-api"
source = "apps/api"
